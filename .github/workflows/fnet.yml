name: FragranceNet Monitor

on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: fragrancenet-monitor
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run FragranceNet monitor
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_TOPIC }}
        run: node fnet-monitor.js

      - name: Commit updated state
        run: |
          git config user.name "fragrance-monitor-bot"
          git config user.email "actions@github.com"
          git add fragrancenet-state.json
          if [ -d history ]; then git add history; fi
          if [ -f price-history.csv ]; then git add price-history.csv; fi
          if [ -f events.json ]; then git add events.json; fi
          git diff --quiet --cached || git commit -m "FragranceNet monitor update [skip ci]"
          git push || (git pull --rebase && git push)
