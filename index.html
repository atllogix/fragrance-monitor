<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Fragrance Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #1a1420;
    --surface: #241b2e;
    --surface-hover: #2c2138;
    --border: #3a2d47;
    --text: #f0e6f5;
    --text-muted: #a693b0;
    --accent: #d4a054;
    --accent-dim: #8a6d3a;
    --new-arrival: #7ec9a3;
    --restocked: #6fa8dc;
    --price-drop: #d4a054;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    background: radial-gradient(ellipse 1200px 600px at 50% -10%, #2a1f38 0%, var(--bg) 55%);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
  }

  header {
    position: sticky;
    top: 0;
    z-index: 10;
    background: rgba(26, 20, 32, 0.92);
    backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    padding: 28px 24px 20px;
  }

  .header-inner {
    max-width: 920px;
    margin: 0 auto;
  }

  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 28px;
    letter-spacing: -0.01em;
    margin: 0 0 4px;
    background: linear-gradient(135deg, var(--text) 0%, var(--accent) 120%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .tagline {
    color: var(--text-muted);
    font-size: 13px;
    margin: 0 0 20px;
  }

  .filters {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
  }

  select, input[type="text"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 12px;
    border-radius: 8px;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s;
  }

  select:focus, input[type="text"]:focus {
    border-color: var(--accent-dim);
  }

  input[type="text"] {
    min-width: 160px;
    flex: 1;
  }

  .count-badge {
    color: var(--text-muted);
    font-size: 12px;
    font-family: 'JetBrains Mono', monospace;
    margin-left: auto;
    white-space: nowrap;
  }

  main {
    max-width: 920px;
    margin: 0 auto;
    padding: 24px;
  }

  .day-group {
    margin-bottom: 28px;
  }

  .day-header {
    font-family: 'Fraunces', serif;
    font-size: 15px;
    font-weight: 500;
    color: var(--accent);
    margin: 0 0 10px;
    padding-left: 2px;
  }

  .event-row {
    display: grid;
    grid-template-columns: 70px 100px 1fr auto;
    gap: 14px;
    align-items: center;
    padding: 12px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--border-type, var(--accent));
    border-radius: 8px;
    margin-bottom: 6px;
    transition: background 0.12s;
  }

  .event-row:hover {
    background: var(--surface-hover);
  }

  .event-time {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text-muted);
  }

  .event-type {
    font-size: 11px;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 5px;
    text-align: center;
    white-space: nowrap;
  }

  .type-new { background: rgba(126, 201, 163, 0.15); color: var(--new-arrival); }
  .type-restock { background: rgba(111, 168, 220, 0.15); color: var(--restocked); }
  .type-drop { background: rgba(212, 160, 84, 0.15); color: var(--price-drop); }

  .event-main {
    min-width: 0;
  }

  .event-title {
    font-size: 14px;
    color: var(--text);
    text-decoration: none;
    font-weight: 500;
  }

  .event-title:hover {
    color: var(--accent);
  }

  .event-meta {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 2px;
  }

  .event-price {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--text-muted);
    text-align: right;
    white-space: nowrap;
  }

  .event-price .new-price {
    color: var(--accent);
    font-weight: 500;
  }

  .empty-state {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-muted);
  }

  .empty-state .icon {
    font-size: 32px;
    margin-bottom: 12px;
    opacity: 0.6;
  }

  @media (max-width: 600px) {
    .event-row {
      grid-template-columns: 1fr;
      gap: 6px;
    }
    .event-time, .event-type { justify-self: start; }
    .event-price { text-align: left; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <h1>Fragrance Monitor</h1>
    <p class="tagline">New arrivals, restocks, and price drops across your tracked stores.</p>
    <div class="filters">
      <select id="dateFilter">
        <option value="today">Today</option>
        <option value="7">Last 7 days</option>
        <option value="30">Last 30 days</option>
        <option value="all">All time</option>
      </select>
      <select id="siteFilter">
        <option value="all">All sites</option>
      </select>
      <select id="typeFilter">
        <option value="all">All types</option>
        <option value="New Arrival">New Arrivals</option>
        <option value="Restocked">Restocked</option>
        <option value="Price Drop">Price Drops</option>
      </select>
      <input type="text" id="brandFilter" placeholder="Filter by brand…">
      <span class="count-badge" id="countBadge"></span>
    </div>
  </div>
</header>

<main id="main">
  <div class="empty-state">
    <div class="icon">⏳</div>
    <div>Loading events…</div>
  </div>
</main>

<script>
let allEvents = [];

function fmtTime(iso) {
  const d = new Date(iso);
  return d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
}

function fmtDayLabel(iso) {
  const d = new Date(iso);
  const today = new Date();
  const isToday = d.toDateString() === today.toDateString();
  if (isToday) return 'Today';
  const yesterday = new Date(today);
  yesterday.setDate(yesterday.getDate() - 1);
  if (d.toDateString() === yesterday.toDateString()) return 'Yesterday';
  return d.toLocaleDateString(undefined, { weekday: 'long', month: 'long', day: 'numeric' });
}

function typeClass(type) {
  if (type === 'New Arrival') return 'type-new';
  if (type === 'Restocked') return 'type-restock';
  return 'type-drop'; // "N% Price Drop"
}

function typeLabel(type) {
  if (type.endsWith('Price Drop')) return type.replace(' Price Drop', '% off');
  return type;
}

function borderColorVar(type) {
  if (type === 'New Arrival') return 'var(--new-arrival)';
  if (type === 'Restocked') return 'var(--restocked)';
  return 'var(--price-drop)';
}

function matchesTypeFilter(eventType, filterValue) {
  if (filterValue === 'all') return true;
  if (filterValue === 'Price Drop') return eventType.endsWith('Price Drop');
  return eventType === filterValue;
}

function populateSiteFilter(events) {
  const sites = [...new Set(events.map((e) => e.domain))].sort();
  const select = document.getElementById('siteFilter');
  sites.forEach((site) => {
    const opt = document.createElement('option');
    opt.value = site;
    opt.textContent = site;
    select.appendChild(opt);
  });
}

function render() {
  const dateFilter = document.getElementById('dateFilter').value;
  const siteFilter = document.getElementById('siteFilter').value;
  const typeFilter = document.getElementById('typeFilter').value;
  const brandFilter = document.getElementById('brandFilter').value.trim().toLowerCase();

  const now = new Date();
  let cutoff = null;
  if (dateFilter === 'today') {
    cutoff = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  } else if (dateFilter !== 'all') {
    cutoff = new Date(now.getTime() - parseInt(dateFilter, 10) * 24 * 60 * 60 * 1000);
  }

  let filtered = allEvents.filter((e) => {
    const d = new Date(e.timestamp);
    if (cutoff && d < cutoff) return false;
    if (siteFilter !== 'all' && e.domain !== siteFilter) return false;
    if (!matchesTypeFilter(e.type, typeFilter)) return false;
    if (brandFilter && !(e.brand || '').toLowerCase().includes(brandFilter)) return false;
    return true;
  });

  filtered.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));

  document.getElementById('countBadge').textContent = `${filtered.length} event${filtered.length === 1 ? '' : 's'}`;

  const main = document.getElementById('main');
  if (filtered.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><div>No events match these filters.</div></div>`;
    return;
  }

  const groups = {};
  filtered.forEach((e) => {
    const dayKey = new Date(e.timestamp).toDateString();
    if (!groups[dayKey]) groups[dayKey] = [];
    groups[dayKey].push(e);
  });

  let html = '';
  Object.keys(groups).forEach((dayKey) => {
    const dayEvents = groups[dayKey];
    html += `<div class="day-group">`;
    html += `<div class="day-header">${fmtDayLabel(dayEvents[0].timestamp)}</div>`;
    dayEvents.forEach((e) => {
      let priceHtml = '';
      if (e.newPrice !== null && e.newPrice !== undefined) {
        if (e.oldPrice !== null && e.oldPrice !== undefined) {
          priceHtml = `<div class="event-price">$${e.oldPrice} → <span class="new-price">$${e.newPrice}</span></div>`;
        } else {
          priceHtml = `<div class="event-price"><span class="new-price">$${e.newPrice}</span></div>`;
        }
      }
      html += `
        <div class="event-row" style="--border-type: ${borderColorVar(e.type)}">
          <div class="event-time">${fmtTime(e.timestamp)}</div>
          <div class="event-type ${typeClass(e.type)}">${typeLabel(e.type)}</div>
          <div class="event-main">
            <a class="event-title" href="${e.url || '#'}" target="_blank" rel="noopener">${e.title}</a>
            <div class="event-meta">${e.brand ? e.brand + ' · ' : ''}${e.domain}</div>
          </div>
          ${priceHtml}
        </div>`;
    });
    html += `</div>`;
  });

  main.innerHTML = html;
}

async function init() {
  try {
    const res = await fetch('events.json?t=' + Date.now());
    if (!res.ok) throw new Error('events.json not found yet');
    allEvents = await res.json();
  } catch (err) {
    document.getElementById('main').innerHTML = `
      <div class="empty-state">
        <div class="icon">🌙</div>
        <div>No events recorded yet — check back after the next monitor run.</div>
      </div>`;
    return;
  }

  populateSiteFilter(allEvents);
  ['dateFilter', 'siteFilter', 'typeFilter'].forEach((id) => {
    document.getElementById(id).addEventListener('change', render);
  });
  document.getElementById('brandFilter').addEventListener('input', render);

  render();

  // Quietly re-check for new events every 60s so the page stays current
  // without needing a manual reload.
  setInterval(async () => {
    try {
      const res = await fetch('events.json?t=' + Date.now());
      if (!res.ok) return;
      allEvents = await res.json();
      render();
    } catch {
      // silent — next interval will retry
    }
  }, 60000);
}

init();
</script>

</body>
</html>
